<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0A1E2E"/>
  <rect y="400" width="800" height="100" fill="#061420"/>
  <!-- Train tracks -->
  <line x1="0" y1="390" x2="800" y2="390" stroke="#1E3A4A" stroke-width="8"/>
  <line x1="0" y1="410" x2="800" y2="410" stroke="#1E3A4A" stroke-width="8"/>
  <!-- Ties -->
  <rect x="50" y="385" width="10" height="30" fill="#243040"/>
  <rect x="110" y="385" width="10" height="30" fill="#243040"/>
  <rect x="170" y="385" width="10" height="30" fill="#243040"/>
  <rect x="230" y="385" width="10" height="30" fill="#243040"/>
  <rect x="290" y="385" width="10" height="30" fill="#243040"/>
  <rect x="350" y="385" width="10" height="30" fill="#243040"/>
  <rect x="410" y="385" width="10" height="30" fill="#243040"/>
  <rect x="470" y="385" width="10" height="30" fill="#243040"/>
  <rect x="530" y="385" width="10" height="30" fill="#243040"/>
  <rect x="590" y="385" width="10" height="30" fill="#243040"/>
  <rect x="650" y="385" width="10" height="30" fill="#243040"/>
  <rect x="710" y="385" width="10" height="30" fill="#243040"/>
  <!-- Bridge abutments -->
  <rect x="120" y="320" width="50" height="80" fill="#243848"/>
  <rect x="630" y="320" width="50" height="80" fill="#243848"/>
  <!-- Main truss spans -->
  <rect x="120" y="200" width="560" height="12" fill="#006E7E"/>
  <rect x="120" y="330" width="560" height="12" fill="#006E7E"/>
  <!-- Truss diagonals -->
  <line x1="120" y1="200" x2="240" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="240" y1="200" x2="120" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="240" y1="200" x2="360" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="360" y1="200" x2="240" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="360" y1="200" x2="480" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="480" y1="200" x2="360" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="480" y1="200" x2="600" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="600" y1="200" x2="480" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="600" y1="200" x2="680" y2="330" stroke="#006E7E" stroke-width="4"/>
  <line x1="680" y1="200" x2="600" y2="330" stroke="#006E7E" stroke-width="4"/>
  <!-- Vertical hangers -->
  <line x1="240" y1="200" x2="240" y2="330" stroke="#1E3A4A" stroke-width="3"/>
  <line x1="360" y1="200" x2="360" y2="330" stroke="#1E3A4A" stroke-width="3"/>
  <line x1="480" y1="200" x2="480" y2="330" stroke="#1E3A4A" stroke-width="3"/>
  <line x1="600" y1="200" x2="600" y2="330" stroke="#1E3A4A" stroke-width="3"/>
  <!-- Label -->
  <rect x="0" y="445" width="800" height="55" fill="#006E7E" opacity="0.9"/>
  <text x="400" y="478" font-family="Arial" font-size="15" font-weight="700" fill="white" text-anchor="middle">PASSARELA FERROVIÁRIA</text>
</svg>
