<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1A1A1A"/>
  <!-- Sepia/vintage photo style -->
  <rect width="800" height="500" fill="#3D2B1F" opacity="0.7"/>
  <!-- Building silhouette - WTC SP style -->
  <rect x="200" y="100" width="180" height="360" fill="#2A1E14"/>
  <rect x="420" y="160" width="180" height="300" fill="#2A1E14"/>
  <!-- Floors -->
  <rect x="200" y="100" width="180" height="6" fill="#8A7060"/>
  <rect x="200" y="140" width="180" height="4" fill="#8A7060" opacity="0.6"/>
  <rect x="200" y="180" width="180" height="4" fill="#8A7060" opacity="0.6"/>
  <rect x="200" y="220" width="180" height="4" fill="#8A7060" opacity="0.6"/>
  <rect x="200" y="260" width="180" height="4" fill="#8A7060" opacity="0.6"/>
  <rect x="420" y="160" width="180" height="6" fill="#8A7060"/>
  <rect x="420" y="200" width="180" height="4" fill="#8A7060" opacity="0.6"/>
  <rect x="420" y="240" width="180" height="4" fill="#8A7060" opacity="0.6"/>
  <rect x="420" y="280" width="180" height="4" fill="#8A7060" opacity="0.6"/>
  <!-- Windows lit up -->
  <rect x="218" y="148" width="24" height="26" fill="#C8A060" opacity="0.6"/>
  <rect x="252" y="148" width="24" height="26" fill="#C8A060" opacity="0.4"/>
  <rect x="286" y="148" width="24" height="26" fill="#C8A060" opacity="0.6"/>
  <rect x="438" y="208" width="24" height="26" fill="#C8A060" opacity="0.5"/>
  <rect x="472" y="208" width="24" height="26" fill="#C8A060" opacity="0.6"/>
  <!-- Ground -->
  <rect y="455" width="800" height="45" fill="#1A1208"/>
  <!-- Vintage grain overlay -->
  <rect width="800" height="500" fill="url(#grain)" opacity="0.05"/>
  <!-- Label -->
  <rect x="0" y="440" width="800" height="60" fill="#3D2B1F" opacity="0.95"/>
  <text x="400" y="463" font-family="Arial" font-size="12" fill="#C8A060" text-anchor="middle">São Paulo · Anos 1990</text>
  <text x="400" y="483" font-family="Arial" font-size="14" font-weight="700" fill="#E8C880" text-anchor="middle">NT ENGENHARIA · HISTÓRIA</text>
</svg>
