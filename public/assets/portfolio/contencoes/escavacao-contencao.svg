<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1A2830"/>
  <!-- Ground layers -->
  <rect x="0" y="200" width="800" height="300" fill="#2A1E14"/>
  <rect x="0" y="240" width="800" height="260" fill="#241A10"/>
  <rect x="0" y="300" width="800" height="200" fill="#1C140C"/>
  <!-- Excavation cut -->
  <path d="M 150 200 L 200 500 L 600 500 L 650 200 Z" fill="#0A1820"/>
  <!-- Retaining wall left -->
  <rect x="200" y="200" width="20" height="300" fill="#3A3A3A"/>
  <!-- Soldier piles / anchors left -->
  <line x1="210" y1="240" x2="100" y2="220" stroke="#006E7E" stroke-width="3"/>
  <line x1="210" y1="290" x2="80" y2="270" stroke="#006E7E" stroke-width="3"/>
  <line x1="210" y1="340" x2="90" y2="320" stroke="#006E7E" stroke-width="3"/>
  <circle cx="100" cy="220" r="6" fill="#006E7E"/>
  <circle cx="80" cy="270" r="6" fill="#006E7E"/>
  <circle cx="90" cy="320" r="6" fill="#006E7E"/>
  <!-- Retaining wall right -->
  <rect x="580" y="200" width="20" height="300" fill="#3A3A3A"/>
  <line x1="590" y1="240" x2="700" y2="220" stroke="#006E7E" stroke-width="3"/>
  <line x1="590" y1="290" x2="720" y2="270" stroke="#006E7E" stroke-width="3"/>
  <line x1="590" y1="340" x2="710" y2="320" stroke="#006E7E" stroke-width="3"/>
  <circle cx="700" cy="220" r="6" fill="#006E7E"/>
  <circle cx="720" cy="270" r="6" fill="#006E7E"/>
  <circle cx="710" cy="320" r="6" fill="#006E7E"/>
  <!-- Foundation slab at bottom -->
  <rect x="200" y="470" width="400" height="30" fill="#2A3A46"/>
  <rect x="200" y="467" width="400" height="6" fill="#006E7E"/>
  <!-- Dimension arrow -->
  <line x1="160" y1="200" x2="160" y2="470" stroke="#006E7E" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="145" y="340" font-family="monospace" font-size="11" fill="#006E7E" text-anchor="middle" transform="rotate(-90 145 340)">ESCAVAÇÃO</text>
  <!-- Ground line -->
  <rect x="0" y="197" width="800" height="6" fill="#006E7E" opacity="0.5"/>
  <!-- Label -->
  <rect x="0" y="445" width="800" height="55" fill="#006E7E" opacity="0.9"/>
  <text x="400" y="478" font-family="Arial" font-size="15" font-weight="700" fill="white" text-anchor="middle">ESCAVAÇÃO E CONTENÇÃO</text>
</svg>
