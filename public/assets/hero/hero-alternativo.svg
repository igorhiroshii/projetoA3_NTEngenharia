<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071520"/>
      <stop offset="100%" stop-color="#0D2D40"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#bg3)"/>
  <!-- Concrete wall texture: vertical panels -->
  <rect x="0" y="0" width="1920" height="800" fill="#091C28"/>
  <rect x="0" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="160" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="320" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="480" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="640" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="800" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="960" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="1120" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="1280" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="1440" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="1600" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="1760" y="0" width="4" height="800" fill="#0D2535"/>
  <rect x="1916" y="0" width="4" height="800" fill="#0D2535"/>
  <!-- Horizontal bands -->
  <rect x="0" y="199" width="1920" height="4" fill="#0D2535"/>
  <rect x="0" y="399" width="1920" height="4" fill="#0D2535"/>
  <rect x="0" y="599" width="1920" height="4" fill="#0D2535"/>
  <!-- Rebar details: diagonal cross-hatch in cells -->
  <line x1="4" y1="0" x2="160" y2="200" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="160" y1="0" x2="4" y2="200" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="160" y1="200" x2="320" y2="400" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="320" y1="200" x2="160" y2="400" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="480" y1="0" x2="640" y2="200" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="640" y1="0" x2="480" y2="200" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="800" y1="200" x2="960" y2="400" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="960" y1="200" x2="800" y2="400" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="1120" y1="0" x2="1280" y2="200" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="1280" y1="0" x2="1120" y2="200" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="1440" y1="400" x2="1600" y2="600" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
  <line x1="1600" y1="400" x2="1440" y2="600" stroke="#006E7E" stroke-width="1" opacity="0.25"/>
