<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0A1E2E"/>
  <rect y="400" width="800" height="100" fill="#061420"/>
  <!-- Tanks -->
  <ellipse cx="200" cy="200" rx="80" ry="20" fill="#1E3A4A" stroke="#006E7E" stroke-width="2"/>
  <rect x="120" y="200" width="160" height="180" fill="#152A38"/>
  <ellipse cx="200" cy="380" rx="80" ry="20" fill="#1E3A4A" stroke="#006E7E" stroke-width="2"/>
  <!-- Tank highlight -->
  <rect x="120" y="200" width="10" height="180" fill="#006E7E" opacity="0.3"/>
  <!-- Dome top tank 1 -->
  <ellipse cx="400" cy="160" rx="90" ry="22" fill="#1E3A4A" stroke="#006E7E" stroke-width="2"/>
  <rect x="310" y="160" width="180" height="200" fill="#152A38"/>
  <ellipse cx="400" cy="360" rx="90" ry="22" fill="#1E3A4A" stroke="#006E7E" stroke-width="2"/>
  <rect x="310" y="160" width="12" height="200" fill="#006E7E" opacity="0.3"/>
  <!-- Spherical tank -->
  <circle cx="630" cy="260" r="110" fill="#152A38" stroke="#006E7E" stroke-width="2"/>
  <path d="M 520 260 Q 630 200 740 260" stroke="#006E7E" stroke-width="1.5" opacity="0.4" fill="none"/>
  <circle cx="630" cy="260" r="12" fill="#006E7E" opacity="0.5"/>
  <!-- Pipe connections -->
  <line x1="200" y1="280" x2="310" y2="250" stroke="#006E7E" stroke-width="4" stroke-linecap="round"/>
  <line x1="490" y1="260" x2="520" y2="260" stroke="#006E7E" stroke-width="4" stroke-linecap="round"/>
  <!-- Support legs -->
  <line x1="360" y1="360" x2="340" y2="400" stroke="#1E3A4A" stroke-width="6"/>
  <line x1="440" y1="360" x2="460" y2="400" stroke="#1E3A4A" stroke-width="6"/>
  <line x1="580" y1="360" x2="560" y2="400" stroke="#1E3A4A" stroke-width="6"/>
  <line x1="680" y1="360" x2="700" y2="400" stroke="#1E3A4A" stroke-width="6"/>
  <!-- Label -->
  <rect x="0" y="445" width="800" height="55" fill="#006E7E" opacity="0.9"/>
  <text x="400" y="478" font-family="Arial" font-size="15" font-weight="700" fill="white" text-anchor="middle">TANQUES INDUSTRIAIS</text>
</svg>
