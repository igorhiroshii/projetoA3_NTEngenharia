<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" fill="none">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1F2E"/>
      <stop offset="60%" stop-color="#0D3347"/>
      <stop offset="100%" stop-color="#1A4A5E"/>
    </linearGradient>
    <linearGradient id="concrete" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3A46"/>
      <stop offset="100%" stop-color="#1A2830"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006E7E"/>
      <stop offset="100%" stop-color="#00A3B8"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#sky)"/>

  <!-- Stars/particles -->
  <circle cx="200" cy="80" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="450" cy="50" r="1" fill="white" opacity="0.3"/>
  <circle cx="800" cy="100" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1200" cy="60" r="1" fill="white" opacity="0.3"/>
  <circle cx="1600" cy="90" r="1.5" fill="white" opacity="0.4"/>

  <!-- Far background: factory silhouette -->
  <rect x="0" y="480" width="1920" height="320" fill="#0D2535"/>
  <!-- Industrial towers background -->
  <rect x="100" y="350" width="30" height="130" fill="#0F2D3F"/>
  <rect x="140" y="380" width="20" height="100" fill="#0F2D3F"/>
  <rect x="1760" y="340" width="30" height="140" fill="#0F2D3F"/>
  <rect x="1800" y="370" width="20" height="110" fill="#0F2D3F"/>
  <!-- Cooling towers -->
  <path d="M 300 480 Q 320 400 340 480 Z" fill="#112E40"/>
  <path d="M 1580 480 Q 1600 400 1620 480 Z" fill="#112E40"/>

  <!-- Main structural frame: large industrial building -->
  <!-- Ground floor slab -->
  <rect x="200" y="680" width="1520" height="20" fill="url(#concrete)"/>
  <!-- Main columns -->
  <rect x="220" y="300" width="18" height="380" fill="url(#concrete)"/>
  <rect x="440" y="340" width="18" height="340" fill="url(#concrete)"/>
  <rect x="660" y="300" width="18" height="380" fill="url(#concrete)"/>
  <rect x="880" y="280" width="18" height="400" fill="url(#concrete)"/>
  <rect x="1100" y="300" width="18" height="380" fill="url(#concrete)"/>
  <rect x="1320" y="340" width="18" height="340" fill="url(#concrete)"/>
  <rect x="1540" y="300" width="18" height="380" fill="url(#concrete)"/>
  <rect x="1700" y="300" width="18" height="380" fill="url(#concrete)"/>
  <!-- Horizontal beams -->
  <rect x="215" y="300" width="1510" height="12" fill="url(#steel)"/>
  <rect x="215" y="440" width="1510" height="10" fill="#1A4A5E"/>
  <rect x="215" y="560" width="1510" height="10" fill="#1A4A5E"/>
  <!-- Diagonal bracing -->
  <line x1="220" y1="300" x2="440" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <line x1="440" y1="300" x2="220" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <line x1="660" y1="300" x2="880" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <line x1="880" y1="300" x2="660" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <line x1="1100" y1="300" x2="1320" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <line x1="1320" y1="300" x2="1100" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <line x1="1540" y1="300" x2="1700" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <line x1="1700" y1="300" x2="1540" y2="440" stroke="#006E7E" stroke-width="4" opacity="0.6"/>
  <!-- Floor panels with windows -->
  <rect x="238" y="312" width="184" height="120" fill="#0A1E2A" opacity="0.8"/>
  <rect x="458" y="352" width="184" height="80" fill="#0A1E2A" opacity="0.8"/>
  <rect x="678" y="312" width="184" height="120" fill="#0A1E2A" opacity="0.8"/>
  <rect x="898" y="292" width="184" height="140" fill="#0A1E2A" opacity="0.8"/>
  <rect x="1118" y="312" width="184" height="120" fill="#0A1E2A" opacity="0.8"/>
  <rect x="1338" y="352" width="184" height="80" fill="#0A1E2A" opacity="0.8"/>
  <!-- Window lights -->
  <rect x="248" y="322" width="40" height="35" fill="#006E7E" opacity="0.5"/>
  <rect x="298" y="322" width="40" height="35" fill="#006E7E" opacity="0.3"/>
  <rect x="348" y="322" width="40" height="35" fill="#00A3B8" opacity="0.4"/>
  <rect x="908" y="302" width="40" height="40" fill="#00A3B8" opacity="0.5"/>
  <rect x="958" y="302" width="40" height="40" fill="#006E7E" opacity="0.3"/>
  <rect x="1008" y="302" width="40" height="40" fill="#006E7E" opacity="0.5"/>
  <!-- Crane structure -->
  <rect x="1680" y="100" width="8" height="200" fill="#1E3A4A"/>
  <rect x="1580" y="100" width="108" height="8" fill="url(#steel)"/>
  <rect x="1688" y="100" width="150" height="6" fill="url(#steel)"/>
  <line x1="1688" y1="106" x2="1688" y2="300" stroke="#006E7E" stroke-width="2" stroke-dasharray="4,4" opacity="0.7"/>
  <!-- Ground level detail -->
  <rect x="0" y="720" width="1920" height="80" fill="#081820"/>
  <!-- Teal accent overlay at bottom -->
  <rect x="0" y="750" width="1920" height="4" fill="#006E7E" opacity="0.6"/>
</svg>
