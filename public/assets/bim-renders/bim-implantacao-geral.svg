<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#071520"/>
  <defs>
    <pattern id="dotgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#006E7E" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#dotgrid)"/>
  <!-- Site boundary -->
  <rect x="60" y="60" width="680" height="380" fill="none" stroke="#006E7E" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Buildings footprints with BIM layers -->
  <rect x="100" y="100" width="220" height="140" fill="#0D2535" stroke="#006E7E" stroke-width="1.5"/>
  <!-- Layer indication -->
  <rect x="100" y="100" width="220" height="6" fill="#006E7E"/>
  <rect x="114" y="112" width="60" height="40" fill="#1A3848" stroke="#006E7E" stroke-width="1" opacity="0.8"/>
  <rect x="184" y="112" width="60" height="40" fill="#1A3848" stroke="#006E7E" stroke-width="1" opacity="0.8"/>
  <rect x="254" y="112" width="60" height="40" fill="#1A3848" stroke="#00A3B8" stroke-width="1" opacity="0.8"/>
  <!-- Second building -->
  <rect x="380" y="100" width="320" height="180" fill="#0D2535" stroke="#00A3B8" stroke-width="1.5"/>
  <rect x="380" y="100" width="320" height="6" fill="#00A3B8"/>
  <!-- Third building -->
  <rect x="100" y="280" width="500" height="120" fill="#0D2535" stroke="#006E7E" stroke-width="1.5"/>
  <rect x="100" y="280" width="500" height="6" fill="#006E7E"/>
  <!-- Component IDs -->
  <text x="210" y="178" font-family="monospace" font-size="9" fill="#006E7E" text-anchor="middle">STR-A01</text>
  <text x="540" y="195" font-family="monospace" font-size="9" fill="#00A3B8" text-anchor="middle">STR-B01</text>
  <text x="350" y="345" font-family="monospace" font-size="9" fill="#006E7E" text-anchor="middle">STR-C01</text>
  <!-- North arrow -->
  <circle cx="720" cy="80" r="20" fill="none" stroke="#006E7E" stroke-width="1.5"/>
  <path d="M 720 62 L 726 90 L 720 86 L 714 90 Z" fill="#006E7E"/>
  <text x="720" y="95" font-family="monospace" font-size="10" fill="#006E7E" text-anchor="middle">N</text>
  <!-- Label -->
  <rect x="0" y="445" width="800" height="55" fill="#006E7E" opacity="0.9"/>
  <text x="400" y="478" font-family="Arial" font-size="15" font-weight="700" fill="white" text-anchor="middle">BIM · IMPLANTAÇÃO GERAL</text>
</svg>
