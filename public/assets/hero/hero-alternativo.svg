  <line x1="0" y1="600" x2="960" y2="200" stroke="#006E7E" stroke-width="3" opacity="0.5"/>
  <line x1="960" y1="200" x2="1920" y2="600" stroke="#006E7E" stroke-width="3" opacity="0.5"/>
  <!-- Teal accent strip -->
  <rect x="0" y="396" width="1920" height="8" fill="#006E7E" opacity="0.4"/>
  <!-- Center cross structure -->
  <rect x="948" y="0" width="24" height="800" fill="#006E7E" opacity="0.15"/>
