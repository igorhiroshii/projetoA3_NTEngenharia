  <ellipse cx="400" cy="260" rx="220" ry="128" fill="none" stroke="#1E3A4A" stroke-width="6"/>
  <ellipse cx="400" cy="260" rx="180" ry="102" fill="none" stroke="#1E3A4A" stroke-width="6"/>
